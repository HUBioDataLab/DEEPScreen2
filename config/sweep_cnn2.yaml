method: grid
metric:
  name: val_loss
  goal: minimize
parameters:
  epoch:
    value: 10
  # --- CNNModel2 Specifics ---
  # fc1 feeds from GAP output (256-dim), so smaller sizes are viable
  fc1:
    values: [64, 128, 256]
  fc2:
    values: [128, 256]
  # --- Common ---
  learning_rate:
    values: [1e-5,7e-6]
  bs:
    values: [32]
  dropout:
    values: [0.1, 0.3]
  muon_lr:
    values: [2.5e-4,3.5e-4]
  end_learning_rate:
    value: 0.2
